{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-2">Admin Login</h3>
                <p class="text-center text-muted mb-4">Access certificate issuing tools.</p>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
                        {{ form.password }}
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Add bootstrap form-control class to all inputs
    document.addEventListener("DOMContentLoaded", function() {
        let inputs = document.querySelectorAll("input");
        inputs.forEach(input => {
            if(input.type !== "submit" && input.type !== "hidden" && input.name !== "csrfmiddlewaretoken") {
                input.classList.add("form-control");
            }
        });
    });
</script>
{% endblock %}
